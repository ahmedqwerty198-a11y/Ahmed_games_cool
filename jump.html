<!DOCTYPE html>
<html>
<head>
    <title>Super Jump - Shift to Restart</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { background: #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); border-radius: 8px; }
        #ui { position: absolute; top: 30px; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .restart-hint { font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="score" style="font-size: 50px; margin: 0;">0</h1>
        <p id="msg"><b>FLÈCHES</b> pour bouger<br><span class="restart-hint">Appuie sur <b>SHIFT</b> pour recommencer</span></p>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const msgElement = document.getElementById('msg');

    canvas.width = 400;
    canvas.height = 600;

    let score, gameActive, player, platforms;
    const keys = {};

    function initGame() {
        score = 0;
        gameActive = true;
        scoreElement.innerText = "0";
        msgElement.innerHTML = "<b>FLÈCHES</b> pour bouger<br><span class='restart-hint'>Appuie sur <b>SHIFT</b> pour recommencer</span>";
        
        player = {
            x: 180, y: 500, width: 40, height: 40,
            vx: 0, vy: 0, jumpStrength: -11, gravity: 0.35
        };

        platforms = [];
        for(let i = 0; i < 7; i++) {
            platforms.push({ 
                x: Math.random() * (canvas.width - 70), 
                y: i * 90, 
                width: 70, 
                height: 15 
            });
        }
    }

    window.onkeydown = (e) => {
        keys[e.code] = true;
        // Si on appuie sur Shift (ShiftLeft ou ShiftRight)
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
            initGame();
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function update() {
        if (!gameActive) return;

        player.vy += player.gravity;
        player.y += player.vy;

        if (keys['ArrowLeft']) player.vx = -6;
        else if (keys['ArrowRight']) player.vx = 6;
        else player.vx *= 0.8;
        player.x += player.vx;

        if (player.x > canvas.width) player.x = -player.width;
        if (player.x < -player.width) player.x = canvas.width;

        if (player.vy > 0) {
            platforms.forEach(p => {
                if (player.x + player.width > p.x && player.x < p.x + p.width &&
                    player.y + player.height > p.y && player.y + player.height < p.y + p.height + player.vy) {
                    player.vy = player.jumpStrength;
                }
            });
        }

        if (player.y < 250) {
            let diff = 250 - player.y;
            player.y = 250;
            score += Math.round(diff / 5);
            scoreElement.innerText = score;
            
            platforms.forEach(p => {
                p.y += diff;
                if (p.y > canvas.height) {
                    p.y = 0;
                    p.x = Math.random() * (canvas.width - p.width);
                }
            });
        }

        if (player.y > canvas.height) {
            gameActive = false;
            msgElement.innerHTML = "<b style='color:#ff4444'>GAME OVER</b><br>Appuie sur <b>SHIFT</b> pour rejouer !";
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Joueur
        ctx.fillStyle = '#00aaff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Plateformes
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#44cc44';
        platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.width, p.height);
            ctx.fillStyle = '#228822';
            ctx.fillRect(p.x, p.y + 10, p.width, 5); // Petit effet d'ombre sur la plateforme
            ctx.fillStyle = '#44cc44';
        });

        update();
        requestAnimationFrame(draw);
    }

    initGame();
    draw();
</script>
</body>
</html>
