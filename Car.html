<!DOCTYPE html>
<html>
<head>
    <title>Course 2D Retro</title>
    <style>
        body { margin: 0; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: Arial; overflow: hidden; }
        canvas { border: 4px solid #555; background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .score { position: absolute; top: 20px; font-size: 24px; }
    </style>
</head>
<body>
    <div class="score">Score: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("scoreVal");

canvas.width = 400;
canvas.height = 600;

// Paramètres
const carWidth = 50;
const carHeight = 80;
let player = { x: 175, y: 500, speed: 7 };
let enemies = [];
let score = 0;
let gameOver = false;
let gameSpeed = 5;

// Contrôles
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function spawnEnemy() {
    const lane = Math.floor(Math.random() * 3); // 3 voies possibles
    enemies.push({ x: lane * 133 + 40, y: -100 });
}

function update() {
    if (gameOver) return;

    // Mouvement joueur
    if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < canvas.width - carWidth) player.x += player.speed;

    // Gestion des ennemis
    if (Math.random() < 0.02) spawnEnemy();

    enemies.forEach((enemy, index) => {
        enemy.y += gameSpeed;

        // Collision
        if (player.x < enemy.x + carWidth && player.x + carWidth > enemy.x &&
            player.y < enemy.y + carHeight && player.y + carHeight > enemy.y) {
            gameOver = true;
            alert("BOOM ! Score final : " + score);
            location.reload();
        }

        // Supprimer si sorti de l'écran
        if (enemy.y > canvas.height) {
            enemies.splice(index, 1);
            score++;
            scoreElement.innerText = score;
            gameSpeed += 0.1; // Le jeu accélère
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // Effacer l'écran
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dessiner la route (lignes blanches)
    ctx.strokeStyle = "white";
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    ctx.moveTo(133, 0); ctx.lineTo(133, 600);
    ctx.moveTo(266, 0); ctx.lineTo(266, 600);
    ctx.stroke();

    // Dessiner le joueur (Voiture Rouge)
    ctx.fillStyle = "#FF0000";
    ctx.fillRect(player.x, player.y, carWidth, carHeight);
    ctx.fillStyle = "black"; // Détails (vitres)
    ctx.fillRect(player.x + 5, player.y + 10, 40, 20);

    // Dessiner les ennemis (Voitures Bleues)
    ctx.fillStyle = "#00AAFF";
    enemies.forEach(enemy => {
        ctx.fillRect(enemy.x, enemy.y, carWidth, carHeight);
        ctx.fillStyle = "white";
        ctx.fillRect(enemy.x + 5, enemy.y + 50, 40, 20);
        ctx.fillStyle = "#00AAFF";
    });
}

update();
</script>
</body>
</html>
